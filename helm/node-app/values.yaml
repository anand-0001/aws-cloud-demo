replicaCount: 2

image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/node-app
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
    ephemeralStorage: 512Mi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeralStorage: 2Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

app:
  port: 3000
  serviceBUrl: "http://service-b:80"
